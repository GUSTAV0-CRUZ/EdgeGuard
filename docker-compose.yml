version: '3.8'

services:
  #INFRA
  redis:
    image: redis:alpine
    container_name: redis-local
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - edgeguard-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq-local
    restart: always
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
      - RABBITMQ_DEFAULT_VHOST=edgeGuard
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - edgeguard-network

  mongodb:
    image: mongo:latest
    container_name: mongodb-local
    restart: always
    environment:
      - MONGO_INITDB_ROOT_USERNAME=user
      - MONGO_INITDB_ROOT_PASSWORD=password
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - edgeguard-network

networks:
  edgeguard-network:
    driver: bridge

volumes:
  redis_data:
  rabbitmq_data:
  mongo_data: